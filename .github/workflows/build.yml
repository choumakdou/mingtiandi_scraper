name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --name mingtiandi_scraper ^
            --add-data "requirements.txt;." ^
            mingtiandi_scraper.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mingtiandi_scraper-windows
          path: dist/mingtiandi_scraper.exe
          if-no-files-found: error
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium
      - run: |
          pyinstaller --onefile --name mingtiandi_scraper mingtiandi_scraper.py
      - uses: actions/upload-artifact@v4
        with:
          name: mingtiandi_scraper-macos
          path: dist/mingtiandi_scraper
